server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/finance_db?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

jwt:
  secret: financeSecretKey2026SpringBootJWT
  expire: 86400000   # 24小时